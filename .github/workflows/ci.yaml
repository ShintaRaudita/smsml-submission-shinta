name: Machine Learning CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  mlops-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Set up job
      uses: actions/checkout@v3

    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Check Env
      run: |
        python --version
        pip --version

    - name: Install dependencies
      run: |
        pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib seaborn

    - name: Run mlflow project
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd Workflow-CI/MLProject
        mlflow run . --no-conda

    - name: Get latest MLflow run_id
      id: get_run
      run: |
        RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_names=['Credit Card Fraud Detection'])['run_id'][0])" 2>/dev/null || echo "latest")
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        echo "Dependencies verified."

    - name: Upload to GitHub Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: trained-model-artifacts
        path: Workflow-CI/MLProject/mlruns/

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n credit-card-model:latest --no-conda

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag credit-card-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/cc-fraud-model:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cc-fraud-model:latest

    - name: Complete job
      run: |
        echo "CI Pipeline Completed Successfully!"



        